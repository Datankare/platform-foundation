name: "CodeQL SAST"

on:
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          # Only the ReDoS test fixture file is excluded — it necessarily
          # contains unsafe regex patterns to verify safe-regex2 validation.
          # All other test files remain fully scanned by CodeQL.
          config: |
            paths-ignore:
              - '__tests__/moderation-blocklist-redos.test.ts'

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
