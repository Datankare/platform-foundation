name: "Semgrep SAST"

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging, develop]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config auto --config p/owasp-top-ten --config p/typescript --error .

      - name: Run Semgrep (artifact)
        if: always()
        run: semgrep scan --config auto --config p/owasp-top-ten --config p/typescript --json --output semgrep-results.json . || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 30
